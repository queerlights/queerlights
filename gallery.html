<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Queer Lights – Gallery</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#000;color:#fff;font-family:'DM Sans',sans-serif}
.nav{display:flex;align-items:center;justify-content:space-between;padding:16px 24px;position:sticky;top:0;background:rgba(0,0,0,.95);backdrop-filter:blur(10px);z-index:100;border-bottom:1px solid #111}
.logo{font-family:'Bebas Neue',sans-serif;font-size:22px;background:linear-gradient(90deg,#ff0080,#ff8c00,#ffe000,#00ff9d,#00c8ff,#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:1px;line-height:1.1;cursor:pointer}
.nav-right{display:flex;align-items:center;gap:14px}
.nav-links{display:flex;gap:20px;font-size:13px;color:rgba(255,255,255,.7)}
.nav-links a{color:inherit;text-decoration:none;cursor:pointer}
.nav-links a:hover{color:#fff}
/* Cart button with badge support */
.cart-btn{width:34px;height:34px;border:1.5px solid #00ff9d;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#00ff9d;font-size:15px;cursor:pointer;position:relative;flex-shrink:0}
.lang-switcher{display:flex;align-items:center;gap:2px;background:#111;border:1px solid #222;border-radius:20px;padding:3px}
.lang-btn{padding:4px 10px;border-radius:16px;font-size:11px;font-weight:500;cursor:pointer;border:none;background:transparent;color:#666;font-family:'DM Sans',sans-serif;transition:all .2s}
.lang-btn.active{background:linear-gradient(90deg,#ff0080,#a855f7);color:#fff}
.gallery-header{padding:48px 24px 32px;text-align:center;background:linear-gradient(180deg,#0a0010,#000)}
.gallery-title{font-family:'Bebas Neue',sans-serif;font-size:48px;letter-spacing:3px;background:linear-gradient(90deg,#ff0080,#a855f7,#00c8ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.gallery-sub{font-size:14px;color:#666;margin-top:8px;letter-spacing:1px}
.filters{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;padding:0 20px 32px}
.filter-btn{padding:7px 18px;border-radius:20px;font-size:11px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:all .2s;border:1px solid #2a2a2a;background:transparent;color:#666;font-family:'DM Sans',sans-serif}
.filter-btn.active,.filter-btn:hover{background:linear-gradient(90deg,#ff0080,#a855f7);border-color:transparent;color:#fff}
.gallery-grid{columns:2;column-gap:10px;padding:0 12px 60px}
@media(min-width:768px){.gallery-grid{columns:3;column-gap:14px;padding:0 24px 80px}}
@media(min-width:1200px){.gallery-grid{columns:4;column-gap:16px;padding:0 40px 80px}}
.gallery-item{break-inside:avoid;margin-bottom:10px;border-radius:14px;overflow:hidden;position:relative;cursor:pointer}
@media(min-width:768px){.gallery-item{margin-bottom:14px}}
.gallery-item img{width:100%;height:auto;display:block;transition:transform .5s}
.gallery-item:hover img{transform:scale(1.04)}
.gallery-overlay{position:absolute;inset:0;background:linear-gradient(0deg,rgba(0,0,0,.9) 0%,rgba(0,0,0,.3) 40%,transparent 70%);opacity:0;transition:opacity .35s;display:flex;flex-direction:column;justify-content:flex-end;padding:18px 16px}
.gallery-item:hover .gallery-overlay{opacity:1}
.item-category{font-size:9px;letter-spacing:2px;text-transform:uppercase;margin-bottom:5px;color:#a855f7}
.item-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px;line-height:1;margin-bottom:5px}
.item-desc{font-size:11px;color:#bbb;line-height:1.5;margin-bottom:10px;font-style:italic}
.item-footer{display:flex;align-items:center;justify-content:space-between}
.item-price{font-size:16px;font-weight:300;color:#00ff9d}
.item-btn{padding:7px 16px;border-radius:20px;font-size:10px;font-weight:500;letter-spacing:1px;text-transform:uppercase;cursor:pointer;border:none;font-family:'DM Sans',sans-serif;background:linear-gradient(90deg,#ff0080,#a855f7);color:#fff;transition:opacity .2s}
.item-btn:hover{opacity:.85}
/* Lightbox */
.lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:500;align-items:center;justify-content:center;padding:20px}
.lightbox.open{display:flex}
.lightbox-inner{max-width:600px;width:100%;position:relative}
.lightbox img{width:100%;height:auto;max-height:70vh;object-fit:contain;border-radius:12px;display:block}
.lightbox-info{padding:20px 0 0}
.lightbox-cat{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#a855f7;margin-bottom:6px}
.lightbox-title{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:1px;margin-bottom:8px}
.lightbox-desc{font-size:13px;color:#999;line-height:1.7;margin-bottom:16px;font-style:italic}
.lightbox-actions{display:flex;gap:10px;align-items:center}
.lightbox-price{font-size:22px;font-weight:300;color:#00ff9d}
.lightbox-buy{padding:12px 28px;border-radius:30px;font-size:13px;font-weight:500;letter-spacing:1px;text-transform:uppercase;cursor:pointer;border:none;font-family:'DM Sans',sans-serif;background:linear-gradient(90deg,#ff0080,#a855f7);color:#fff;transition:opacity .2s}
.lightbox-buy:hover{opacity:.85}
.lightbox-close{position:absolute;top:-12px;right:-12px;width:36px;height:36px;border-radius:50%;background:#222;border:1px solid #333;color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:border-color .2s}
.lightbox-close:hover{border-color:#ff0080;color:#ff0080}
.lightbox-nav{display:flex;gap:10px;margin-top:16px;justify-content:center}
.lightbox-nav button{padding:8px 20px;border-radius:20px;border:1px solid #333;background:transparent;color:#fff;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:12px}
.lightbox-nav button:hover{border-color:#a855f7;color:#a855f7}
</style>
</head>
<body>
<nav class="nav">
  <div class="logo" onclick="window.location='home.html'">QUEER<br>LIGHTS</div>
  <div class="nav-right">
    <div class="nav-links">
      <a href="gallery.html" data-i18n="nav_gallery">Gallery</a>
      <a href="about.html" data-i18n="nav_about">About</a>
      <a href="commission.html" data-i18n="nav_commission">Commission</a>
    </div>
    <!-- Cart button — badge injected by cart.js -->
    <div class="cart-btn" title="Mon panier">&#128cart;🛒
      <span class="ql-cart-badge"></span>
    </div>
    <div class="lang-switcher">
      <button class="lang-btn active" id="btn-en" onclick="setLang('en')">🇬🇧 EN</button>
      <button class="lang-btn" id="btn-fr" onclick="setLang('fr')">🇫🇷 FR</button>
    </div>
  </div>
</nav>

<div class="gallery-header">
  <h1 class="gallery-title" data-i18n="gallery_title">GALLERY</h1>
  <p class="gallery-sub" data-i18n="gallery_sub">Explore the collection of provocative queer art by Kamion Fox</p>
</div>

<div class="filters">
  <button class="filter-btn active" onclick="filter('all',this)" data-i18n="filter_all">All Works</button>
  <button class="filter-btn" onclick="filter('surreal',this)" data-i18n="filter_surreal">Surreal</button>
  <button class="filter-btn" onclick="filter('sacred',this)" data-i18n="filter_sacred">Sacred</button>
  <button class="filter-btn" onclick="filter('pop',this)" data-i18n="filter_pop">Pop Art</button>
  <button class="filter-btn" onclick="filter('erotic',this)" data-i18n="filter_erotic">Erotic</button>
</div>

<div class="gallery-grid" id="grid"></div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="closeLightboxOutside(event)">
  <div class="lightbox-inner">
    <button class="lightbox-close" onclick="closeLightbox()">&#215;</button>
    <img id="lb-img" src="" alt="">
    <div class="lightbox-info">
      <p class="lightbox-cat" id="lb-cat"></p>
      <h2 class="lightbox-title" id="lb-title"></h2>
      <p class="lightbox-desc" id="lb-desc"></p>
      <div class="lightbox-actions">
        <span class="lightbox-price" id="lb-price"></span>
        <button class="lightbox-buy" id="lb-cart-btn" data-i18n="add_to_cart">Add to Cart</button>
      </div>
    </div>
    <div class="lightbox-nav">
      <button onclick="navLightbox(-1)" data-i18n="prev">&#8592; Prev</button>
      <button onclick="navLightbox(1)" data-i18n="next">Next &#8594;</button>
    </div>
  </div>
</div>

<script>
/* ── i18n ── */
const i18n = {
  en: { nav_gallery:"Gallery", nav_about:"About", nav_commission:"Commission", gallery_title:"GALLERY", gallery_sub:"Explore the collection of provocative queer art by Kamion Fox", filter_all:"All Works", filter_surreal:"Surreal", filter_sacred:"Sacred", filter_pop:"Pop Art", filter_erotic:"Erotic", add_to_cart:"Add to Cart", prev:"&#8592; Prev", next:"Next &#8594;", view:"View" },
  fr: { nav_gallery:"Galerie", nav_about:"&#192; propos", nav_commission:"Commissions", gallery_title:"GALERIE", gallery_sub:"Explorez la collection d'art queer provocateur de Kamion Fox", filter_all:"Toutes", filter_surreal:"Surr&#233;el", filter_sacred:"Sacr&#233;", filter_pop:"Pop Art", filter_erotic:"&#201;rotique", add_to_cart:"Ajouter au panier", prev:"&#8592; Pr&#233;c.", next:"Suiv. &#8594;", view:"Voir" }
};

let currentLang = 'en';
function setLang(lang) {
  currentLang = lang;
  document.getElementById('btn-en').classList.toggle('active', lang === 'en');
  document.getElementById('btn-fr').classList.toggle('active', lang === 'fr');
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.dataset.i18n;
    if (i18n[lang][key]) el.innerHTML = i18n[lang][key];
  });
}

/* ── Works data ── */
// Replace img values with your real paths, e.g. "images/work1.jpg"
const works = [
  { id:'w1', title:'Neon Genesis', category:'surreal', price:'45', img:'images/collage1.jpg', desc:'A journey through electric dreams and fractured identity.' },
  { id:'w2', title:'Sacred Vessel', category:'sacred',  price:'45', img:'images/collage2.jpg', desc:'Devotion reframed through a queer spiritual lens.' },
  { id:'w3', title:'Pop Idol',      category:'pop',     price:'45', img:'images/collage3.jpg', desc:'Celebrity culture deconstructed, reassembled with glitter.' },
  { id:'w4', title:'Venus Rising',  category:'erotic',  price:'45', img:'images/collage4.jpg', desc:'An ode to the body in all its provocative glory.' },
  { id:'w5', title:'Astral Body',   category:'surreal', price:'45', img:'images/collage5.jpg', desc:'Consciousness adrift between worlds.' },
  { id:'w6', title:'Holy Ghost',    category:'sacred',  price:'45', img:'images/collage6.jpg', desc:'Faith queered, faith reclaimed.' },
  { id:'w7', title:'Candy Crash',   category:'pop',     price:'45', img:'images/collage7.jpg', desc:'Sugar-coated chaos in primary colours.' },
];

let currentFilter = 'all';
let currentLbIdx = 0;
let filteredWorks = [...works];

/* ── Grid rendering ── */
function renderGrid(list) {
  const grid = document.getElementById('grid');
  grid.innerHTML = list.map((w, i) => `
    <div class="gallery-item" data-category="${w.category}" onclick="openLightbox(${i})">
      <img src="${w.img}" alt="${w.title}" loading="lazy">
      <div class="gallery-overlay">
        <p class="item-category">${w.category}</p>
        <h3 class="item-title">${w.title}</h3>
        <p class="item-desc">${w.desc}</p>
        <div class="item-footer">
          <span class="item-price">&#8364;${w.price}</span>
          <button class="item-btn" onclick="addToCartFromGrid(event,'${w.id}')">
            ${i18n[currentLang].add_to_cart}
          </button>
        </div>
      </div>
    </div>
  `).join('');
}

function addToCartFromGrid(e, id) {
  e.stopPropagation(); // don't open lightbox
  const w = works.find(x => x.id === id);
  if (!w) return;
  QLCart.add({ id: w.id, title: w.title, price: w.price, img: w.img, type: w.category });
}

/* ── Filter ── */
function filter(cat, btn) {
  currentFilter = cat;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  filteredWorks = cat === 'all' ? [...works] : works.filter(w => w.category === cat);
  renderGrid(filteredWorks);
}

/* ── Lightbox ── */
function openLightbox(idx) {
  currentLbIdx = idx;
  const w = filteredWorks[idx];
  document.getElementById('lb-img').src = w.img;
  document.getElementById('lb-cat').textContent = w.category;
  document.getElementById('lb-title').textContent = w.title;
  document.getElementById('lb-desc').textContent = w.desc;
  document.getElementById('lb-price').textContent = '\u20AC' + w.price;
  // Wire up Add to Cart in lightbox
  const btn = document.getElementById('lb-cart-btn');
  btn.onclick = () => {
    QLCart.add({ id: w.id, title: w.title, price: w.price, img: w.img, type: w.category });
    closeLightbox();
  };
  document.getElementById('lightbox').classList.add('open');
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
}

function closeLightboxOutside(e) {
  if (e.target === document.getElementById('lightbox')) closeLightbox();
}

function navLightbox(dir) {
  currentLbIdx = (currentLbIdx + dir + filteredWorks.length) % filteredWorks.length;
  openLightbox(currentLbIdx);
}

/* ── Keyboard nav ── */
document.addEventListener('keydown', e => {
  if (!document.getElementById('lightbox').classList.contains('open')) return;
  if (e.key === 'Escape') closeLightbox();
  if (e.key === 'ArrowLeft') navLightbox(-1);
  if (e.key === 'ArrowRight') navLightbox(1);
});

/* ── Init ── */
renderGrid(works);
</script>

<!-- Shared cart — must come after the page scripts -->
<script src="cart.js"></script>
</body>
</html>
